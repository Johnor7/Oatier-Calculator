<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oatlier LinkedIn Pilot Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; max-width: 720px; margin: 0 auto; }

  /* Brand header */
  .brand-header { background: #7C3AED; padding: 20px 32px; }
  .brand-header img { height: 44px; width: auto; display: block; }
  .brand-bar { background: #F5C518; height: 7px; }

  /* Content */
  .content { padding: 36px 32px 40px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .meta { font-size: 12px; color: #888; margin-bottom: 2rem; }
  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 20px; }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .slider-label { font-size: 13px; color: #666; min-width: 90px; }
  .slider-track-wrap { flex: 1; position: relative; padding-top: 28px; }
  input[type=range] { width: 100%; accent-color: #7C3AED; display: block; }

  /* Realistic marker badge */
  .realistic-badge {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    background: #7C3AED;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 7px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
  }
  .realistic-badge::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #7C3AED;
  }

  .slider-val { font-size: 13px; font-weight: 500; min-width: 52px; text-align: right; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { padding: 10px 12px; border-bottom: 1px solid #e0e0e0; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; color: #888; }
  th:first-child { text-align: left; }
  td { padding: 11px 12px; border-bottom: 0.5px solid #f0f0f0; text-align: center; font-weight: 500; }
  td:first-child { text-align: left; color: #888; font-weight: 400; font-size: 12px; }
  tr:nth-child(even) td { background: #fafafa; }
  .neg { color: #a32d2d; }
  .pos { color: #3b6d11; }
  .callout { margin-top: 1rem; padding: 11px 14px; border-left: 2px solid #b5d4f4; background: #e6f1fb; font-size: 12px; color: #185fa5; }
  .footer { margin-top: 1rem; font-size: 11px; color: #bbb; }
  .th-neg { color: #a32d2d; }
  .th-pos { color: #3b6d11; }
</style>
</head>
